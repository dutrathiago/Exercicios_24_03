<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo CSS</title>
</head>
  <body style="font-family: Arial; margin: 20px">
    <h1 style="color: darkblue">Guia de CSS</h1>

    <p style="color: black">
      CSS (Cascading Style Sheets) é usado para estilizar páginas web.
    </p>

    <h2 style="color: green">5 Seletores CSS</h2>

    <p style="background-color: lightgray">
      Seletor de elemento: estiliza todas as tags iguais.
    </p>

    <p class="classe-exemplo" style="color: purple">
      Seletor de classe: usa .nomeClasse
    </p>

    <p id="id-exemplo" style="color: red">Seletor de ID: usa #nomeID</p>

    <div style="border: 1px solid black; padding: 10px">
      <p style="color: brown">
        Seletor descendente: estiliza elementos dentro de outros
      </p>
    </div>

    <input
      type="text"
      placeholder="Digite algo"
      style="padding: 5px; border: 2px solid blue"
    />
  </body>
</html>
